name: Build Installers

# Triggered by a version tag (git tag v1.2 && git push --tags)
# or manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Opt into Node.js 24 for all actions now, ahead of the June 2026 deadline.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── Windows: .exe installer ──────────────────────────────────────────────────
  build-windows:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract version from tag
        id: ver
        shell: bash
        # strips the leading "v" from the tag name (v1.2 → 1.2)
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version.py
        # Makes version.py the single source of truth at build time
        shell: bash
        run: echo "__version__ = \"${{ steps.ver.outputs.VERSION }}\"" > version.py

      - name: Install Python dependencies
        run: pip install pyinstaller pillow certifi

      - name: Generate icon.ico
        run: python create_icon.py

      - name: Build exe with PyInstaller
        run: python -m PyInstaller BoardGameLibrary.spec --clean -y

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion="${{ steps.ver.outputs.VERSION }}" `
            BoardGameLibrary.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/BoardGameLibrarySetup-*.exe
          if-no-files-found: error

  # ── macOS: .dmg installer ────────────────────────────────────────────────────
  build-macos:
    name: macOS installer
    runs-on: macos-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract version from tag
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version.py
        shell: bash
        run: echo "__version__ = \"${{ steps.ver.outputs.VERSION }}\"" > version.py

      - name: Install Python dependencies
        run: pip install pyinstaller pillow certifi

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Generate icon.icns
        run: python create_icon_mac.py

      - name: Build .app bundle with PyInstaller
        run: python -m PyInstaller BoardGameLibrary-mac.spec --clean -y

      - name: Package .dmg
        run: bash build_mac.sh

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/BoardGameLibraryInstaller-*.dmg
          if-no-files-found: error

  # ── GitHub Release: attach both installers ───────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Extract version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Board Game Library v${{ steps.ver.outputs.VERSION }}
          draft: false
          prerelease: false
          files: artifacts/*
          body: |
            ## Board Game Library v${{ steps.ver.outputs.VERSION }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows 10/11 | `BoardGameLibrarySetup-v${{ steps.ver.outputs.VERSION }}.exe` |
            | macOS 12+ | `BoardGameLibraryInstaller-v${{ steps.ver.outputs.VERSION }}.dmg` |

            Both installers are fully self-contained — no Python installation required.

            ### What's included
            - Full game library synced from BoardGameGeek
            - Check-in / check-out member tracking
            - Play log with date, players, and winner
            - Favorites, 3D-insert badges, and complexity filters
            - Offline — all data stored locally
