name: Build Installers

# Triggered by a PER-PLATFORM version tag:
#   • desktop-vX.Y.Z  (e.g. desktop-v6.3.1) → Windows + macOS installers,
#                       stamps version.py,  publishes a "Desktop" GitHub Release.
#   • mobile-vX.Y.Z   (e.g. mobile-v1.19.4) → Android APK via EAS Build,
#                       stamps app.json,    publishes a "Mobile" GitHub Release.
#
# Each tag builds & releases ONLY its own platform(s) and stamps ONLY its own
# version file, so a mobile tag can never mislabel desktop (or vice-versa).
# Coordinated release of everything = push both a desktop-v* and a mobile-v* tag.
#
# Manual runs (Actions tab → Run workflow) build the chosen platform but do NOT
# publish a release — use them for test builds.
#
# Required GitHub Secrets:
#   BGG_APP_TOKEN — BGG application token (shared by desktop + mobile)
#   EXPO_TOKEN    — Expo account access token for EAS Build authentication
#                   Create at: https://expo.dev/accounts/[you]/settings/access-tokens
on:
  push:
    tags:
      - 'desktop-v*'
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (manual runs do not publish a release)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos
          - mobile

# Opt into Node.js 24 for all actions now, ahead of the June 2026 deadline.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── Windows: .exe installer ──────────────────────────────────────────────────
  build-windows:
    name: Windows installer
    runs-on: windows-latest
    if: >-
      startsWith(github.ref, 'refs/tags/desktop-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'windows'))

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == desktop-v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#desktop-v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp version.py
        shell: bash
        run: echo "__version__ = \"${{ steps.ver.outputs.VERSION }}\"" > version.py

      - name: Install Python dependencies
        run: pip install pyinstaller pillow certifi keyring

      - name: Write secrets.py
        shell: bash
        env:
          BGG_APP_TOKEN: ${{ secrets.BGG_APP_TOKEN }}
        run: printf 'BGG_APP_TOKEN = "%s"\n' "$BGG_APP_TOKEN" > _secrets.py

      - name: Generate icon.ico
        run: python create_icon.py

      - name: Build exe with PyInstaller
        run: python -m PyInstaller BoardGameLibrary.spec --clean -y

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion="${{ steps.ver.outputs.VERSION }}" `
            BoardGameLibrary.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/BoardGameLibrarySetup-*.exe
          if-no-files-found: error

  # ── macOS: .dmg installer ────────────────────────────────────────────────────
  build-macos:
    name: macOS installer (Apple Silicon)
    runs-on: macos-latest
    if: >-
      startsWith(github.ref, 'refs/tags/desktop-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'macos'))

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == desktop-v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#desktop-v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Python dependencies
        run: pip install pyinstaller pillow certifi keyring

      - name: Write secrets.py
        shell: bash
        env:
          BGG_APP_TOKEN: ${{ secrets.BGG_APP_TOKEN }}
        run: printf 'BGG_APP_TOKEN = "%s"\n' "$BGG_APP_TOKEN" > _secrets.py

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Generate icon.icns
        run: python create_icon_mac.py

      - name: Build .app bundle with PyInstaller
        run: python -m PyInstaller BoardGameLibrary-mac.spec --clean -y

      - name: Package .dmg
        run: bash build_mac.sh

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/BoardGameLibraryInstaller-*.dmg
          if-no-files-found: error

  # ── Mobile: Android APK via EAS Build ────────────────────────────────────────
  # EAS Build runs on Expo's cloud infrastructure. The EXPO_TOKEN secret
  # authenticates the build. BGG_APP_TOKEN is injected as EXPO_PUBLIC_BGG_TOKEN
  # so the compiled app bundle can make authenticated BGG API calls.
  build-mobile:
    name: Mobile app (Android APK)
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/mobile-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'mobile'))

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Set up Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == mobile-v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#mobile-v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp app.json version
        working-directory: mobile
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            cfg.expo.version = '${{ steps.ver.outputs.VERSION }}';
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
          "

      - name: Create artifacts directory
        run: mkdir -p "${{ github.workspace }}/artifacts"

      - name: Build Android APK (EAS cloud)
        working-directory: mobile
        env:
          # Injected into the JS bundle as process.env.EXPO_PUBLIC_BGG_TOKEN
          EXPO_PUBLIC_BGG_TOKEN: ${{ secrets.BGG_APP_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --output "${{ github.workspace }}/artifacts/BoardGameLibraryMobile-v${{ steps.ver.outputs.VERSION }}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-apk
          path: artifacts/BoardGameLibraryMobile-v${{ steps.ver.outputs.VERSION }}.apk
          if-no-files-found: error

  # ── Desktop GitHub Release: Windows + macOS installers ────────────────────────
  release-desktop:
    name: Create Desktop Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    # Only on a desktop-v* tag, and only if at least one desktop build succeeded.
    if: |
      startsWith(github.ref, 'refs/tags/desktop-v') &&
      always() &&
      (
        needs.build-windows.result == 'success' ||
        needs.build-macos.result  == 'success'
      )

    permissions:
      contents: write

    steps:
      - name: Extract version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#desktop-v}" >> "$GITHUB_OUTPUT"

      - name: Download Windows installer
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Download macOS DMG
        if: needs.build-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Board Game Library Desktop v${{ steps.ver.outputs.VERSION }}
          draft: false
          prerelease: false
          make_latest: 'true'
          files: artifacts/*
          body: |
            ## Board Game Library — Desktop v${{ steps.ver.outputs.VERSION }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows 10/11 | `BoardGameLibrarySetup-v${{ steps.ver.outputs.VERSION }}.exe` |
            | macOS (Apple Silicon) | `BoardGameLibraryInstaller-v${{ steps.ver.outputs.VERSION }}.dmg` |

            Desktop installers are self-contained — no Python required.

            ### What's included
            - Full game library synced from BoardGameGeek
            - Check-in / check-out member tracking
            - Play log with date, players, and winner
            - Favorites, 3D-insert badges, and complexity filters
            - Offline — all data stored locally

  # ── Mobile GitHub Release: Android APK ────────────────────────────────────────
  release-mobile:
    name: Create Mobile Release
    needs: [build-mobile]
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    # Only on a mobile-v* tag, and only if the mobile build succeeded.
    if: |
      startsWith(github.ref, 'refs/tags/mobile-v') &&
      always() &&
      needs.build-mobile.result == 'success'

    permissions:
      contents: write

    steps:
      - name: Extract version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#mobile-v}" >> "$GITHUB_OUTPUT"

      - name: Download mobile APK
        uses: actions/download-artifact@v4
        with:
          name: mobile-apk
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Board Game Library Mobile v${{ steps.ver.outputs.VERSION }}
          draft: false
          prerelease: false
          # Desktop is the flagship line; mobile releases don't claim "Latest".
          make_latest: 'false'
          files: artifacts/*
          body: |
            ## Board Game Library — Mobile v${{ steps.ver.outputs.VERSION }}

            ### Download
            | Platform | File |
            |----------|------|
            | Android | `BoardGameLibraryMobile-v${{ steps.ver.outputs.VERSION }}.apk` |

            Android APK can be sideloaded (enable "Install from unknown sources" in Settings).

            ### What's included
            - Full game library synced from BoardGameGeek
            - Check-in / check-out member tracking
            - Play log with date, players, and winner
            - Favorites and complexity filters
            - Offline — all data stored locally
